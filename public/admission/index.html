<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HSC Vocational Admission</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    animation: {
                        'blob': 'blob 7s infinite',
                    },
                    keyframes: {
                        blob: {
                            '0%': { transform: 'translate(0px, 0px) scale(1)' },
                            '33%': { transform: 'translate(30px, -50px) scale(1.1)' },
                            '66%': { transform: 'translate(-20px, 20px) scale(0.9)' },
                            '100%': { transform: 'translate(0px, 0px) scale(1)' },
                        }
                    }
                }
            }
        }
    </script>
    <style>
        .glass {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.07);
        }
        .toast-enter { animation: slideIn 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        .toast-exit { animation: slideOut 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        @keyframes slideOut { from { transform: translateX(0); opacity: 1; } to { transform: translateX(100%); opacity: 0; } }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 relative min-h-screen flex items-center justify-center p-4 sm:p-8 overflow-x-hidden">
    <!-- Background Blobs -->
    <div class="fixed top-0 left-10 w-72 h-72 bg-blue-300 rounded-full mix-blend-multiply filter blur-2xl opacity-50 animate-blob"></div>
    <div class="fixed top-0 right-10 w-72 h-72 bg-indigo-300 rounded-full mix-blend-multiply filter blur-2xl opacity-50 animate-blob" style="animation-delay: 2s"></div>
    <div class="fixed -bottom-8 left-1/2 w-72 h-72 bg-purple-300 rounded-full mix-blend-multiply filter blur-2xl opacity-50 animate-blob" style="animation-delay: 4s"></div>

    <div class="w-full max-w-2xl relative z-10">
        <div class="glass rounded-3xl p-8 sm:p-10">
            <div class="text-center mb-10">
                <div class="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-blue-600 text-white mb-4 shadow-lg shadow-blue-600/30">
                    <i data-lucide="graduation-cap" class="w-8 h-8"></i>
                </div>
                <h1 class="text-3xl font-bold text-slate-900 tracking-tight">HSC Vocational Admission</h1>
                <p class="text-slate-500 mt-2">Fill out the form below to proceed with your admission payment.</p>
            </div>

            <form id="admissionForm" class="space-y-6">
                <div class="grid grid-cols-1 sm:grid-cols-2 gap-6">
                    <!-- Full Name -->
                    <div class="space-y-2">
                        <label class="text-sm font-medium text-slate-700">Full Name <span class="text-red-500">*</span></label>
                        <input type="text" id="fullName" required class="w-full px-4 py-3 rounded-xl border border-slate-200 bg-white/50 focus:bg-white focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition-all" placeholder="John Doe">
                    </div>
                    <!-- Roll Number -->
                    <div class="space-y-2">
                        <label class="text-sm font-medium text-slate-700">Roll Number <span class="text-red-500">*</span></label>
                        <input type="text" id="rollNumber" required class="w-full px-4 py-3 rounded-xl border border-slate-200 bg-white/50 focus:bg-white focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition-all" placeholder="123456">
                    </div>
                    <!-- Phone Number -->
                    <div class="space-y-2">
                        <label class="text-sm font-medium text-slate-700">Phone Number <span class="text-red-500">*</span></label>
                        <input type="tel" id="phone" pattern="[0-9]{11}" required class="w-full px-4 py-3 rounded-xl border border-slate-200 bg-white/50 focus:bg-white focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition-all" placeholder="01XXXXXXXXX">
                        <p class="text-xs text-slate-500">11-digit mobile number</p>
                    </div>
                    <!-- Email -->
                    <div class="space-y-2">
                        <label class="text-sm font-medium text-slate-700">Email Address <span class="text-red-500">*</span></label>
                        <input type="email" id="email" required class="w-full px-4 py-3 rounded-xl border border-slate-200 bg-white/50 focus:bg-white focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition-all" placeholder="john@example.com">
                    </div>
                </div>

                <!-- Course -->
                <div class="space-y-2">
                    <label class="text-sm font-medium text-slate-700">Select Course <span class="text-red-500">*</span></label>
                    <select id="course" required class="w-full px-4 py-3 rounded-xl border border-slate-200 bg-white/50 focus:bg-white focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition-all appearance-none">
                        <option value="" disabled selected>Choose a vocational course...</option>
                        <option value="Computer & Information Technology">Computer & Information Technology</option>
                        <option value="Electrical Works">Electrical Works</option>
                        <option value="Mechanical Drafting">Mechanical Drafting</option>
                        <option value="Civil Construction">Civil Construction</option>
                    </select>
                </div>

                <!-- Address -->
                <div class="space-y-2">
                    <label class="text-sm font-medium text-slate-700">Full Address <span class="text-red-500">*</span></label>
                    <textarea id="address" required rows="3" class="w-full px-4 py-3 rounded-xl border border-slate-200 bg-white/50 focus:bg-white focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition-all resize-none" placeholder="Enter your present address"></textarea>
                </div>

                <button type="submit" id="submitBtn" class="w-full py-4 px-6 rounded-xl bg-blue-600 hover:bg-blue-700 text-white font-semibold shadow-lg shadow-blue-600/30 transition-all flex items-center justify-center gap-2 disabled:opacity-70 disabled:cursor-not-allowed">
                    <span>Proceed to Secure Payment</span>
                    <i data-lucide="shield-check" class="w-5 h-5"></i>
                </button>
            </form>
        </div>
    </div>

    <!-- Loading Overlay -->
    <div id="loadingOverlay" class="fixed inset-0 bg-white/80 backdrop-blur-sm z-50 flex flex-col items-center justify-center opacity-0 pointer-events-none transition-opacity duration-300">
        <div class="w-16 h-16 border-4 border-blue-200 border-t-blue-600 rounded-full animate-spin mb-4"></div>
        <h2 class="text-xl font-semibold text-slate-800">Processing...</h2>
        <p class="text-slate-500 mt-2">Connecting to secure payment gateway</p>
    </div>

    <!-- Toast Container -->
    <div id="toastContainer" class="fixed bottom-6 right-6 z-50 flex flex-col gap-3"></div>

    <script>
        // Initialize Icons
        lucide.createIcons();

        const form = document.getElementById('admissionForm');
        const submitBtn = document.getElementById('submitBtn');
        const loadingOverlay = document.getElementById('loadingOverlay');
        const toastContainer = document.getElementById('toastContainer');

        // 👇👇👇 NETLIFY FUNCTION URL 👇👇👇
        const PAYMENT_API_URL = "/.netlify/functions/createPayment";

        function showToast(message, type = 'success') {
            const toast = document.createElement('div');
            const isSuccess = type === 'success';
            toast.className = `toast-enter flex items-center gap-3 px-6 py-4 rounded-xl shadow-xl border ${isSuccess ? 'bg-white border-green-100' : 'bg-white border-red-100'}`;
            
            toast.innerHTML = `
                <div class="${isSuccess ? 'text-green-500' : 'text-red-500'}">
                    <i data-lucide="${isSuccess ? 'check-circle-2' : 'alert-circle'}" class="w-6 h-6"></i>
                </div>
                <p class="font-medium text-slate-800">${message}</p>
            `;
            
            toastContainer.appendChild(toast);
            lucide.createIcons();

            setTimeout(() => {
                toast.classList.replace('toast-enter', 'toast-exit');
                setTimeout(() => toast.remove(), 400);
            }, 3000);
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            // Get values
            const data = {
                name: document.getElementById('fullName').value.trim(),
                roll: document.getElementById('rollNumber').value.trim(),
                phone: document.getElementById('phone').value.trim(),
                email: document.getElementById('email').value.trim(),
                course: document.getElementById('course').value,
                address: document.getElementById('address').value.trim(),
                timestamp: new Date().toISOString()
            };

            // Basic Validation
            if(!data.name || !data.roll || !data.phone || !data.email || !data.course || !data.address) {
                showToast('Please fill all required fields', 'error');
                return;
            }

            if(!/^[0-9]{11}$/.test(data.phone)) {
                showToast('Please enter a valid 11-digit phone number', 'error');
                return;
            }

            try {
                // Disable button & show loading
                submitBtn.disabled = true;
                submitBtn.innerHTML = '<div class="w-5 h-5 border-2 border-white/30 border-t-white rounded-full animate-spin"></div><span>Please wait...</span>';
                
                // Save to localStorage
                localStorage.setItem('admission_data', JSON.stringify(data));

                // Show overlay
                loadingOverlay.classList.remove('opacity-0', 'pointer-events-none');
                
                // Call Netlify Function to get secure payment URL
                const response = await fetch(PAYMENT_API_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(data)
                });

                const result = await response.json();

                if (response.ok && result.payment_url) {
                    // Redirect user to the secure Rupantor Pay URL generated by backend
                    window.location.href = result.payment_url;
                } else {
                    throw new Error(result.error || "Failed to generate payment link.");
                }

            } catch (error) {
                console.error(error);
                loadingOverlay.classList.add('opacity-0', 'pointer-events-none');
                showToast('Payment gateway error. Please check configuration.', 'error');
                submitBtn.disabled = false;
                submitBtn.innerHTML = '<span>Proceed to Secure Payment</span><i data-lucide="shield-check" class="w-5 h-5"></i>';
                lucide.createIcons();
            }
        });
    </script>
</body>
</html>
